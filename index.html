<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>大黑猫与小花猫的猫窝</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="猫窝">
    <link rel="apple-touch-icon" href="assets/icon.png">
    <meta name="theme-color" content="#FDFBF7">
    
    <style>
        /* 1. 极致纯净的燕麦底纸 */
        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            background-image: url('assets/大底图.png');
            background-size: cover;
            background-position: center;
            overflow: hidden;
            background-color: #FDFBF7;
            -webkit-tap-highlight-color: transparent; /* 移除苹果默认触摸高光 */
        }

        /* 2. 环境沉浸层：6朵快云、6片巨型多色枫叶、氛围星星、藏线藤蔓 */
        .ambient-layer {
            position: absolute; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        /* 底部辅助背景藤蔓 */
        .deco-vine {
            position: absolute; top: -5%; width: 50px; opacity: 0.85; z-index: 6;
            animation: vineSway 8s infinite ease-in-out alternate;
            transform-origin: top center;
        }
        .vine-left { left: 18%; height: 380px; object-fit: cover; object-position: top; }
        .vine-right { right: 15%; height: 320px; object-fit: cover; object-position: top; animation-delay: 2s; }
        @keyframes vineSway { 0% { transform: rotate(-3deg); } 100% { transform: rotate(3deg); } }

        /* 6朵轻快穿插的云 */
        .deco-cloud {
            position: absolute; opacity: 0.88;
            animation: cloudDrift var(--speed, 8s) infinite alternate ease-in-out;
        }
        .cloud-1 { width: 180px; top: 8%; left: -5%; --speed: 7s; }
        .cloud-2 { width: 140px; top: 22%; right: -5%; --speed: 8.5s; animation-direction: alternate-reverse; }
        .cloud-3 { width: 160px; top: 48%; left: -3%; --speed: 6.5s; }
        .cloud-4 { width: 130px; top: 60%; right: 2%; --speed: 9s; animation-direction: alternate-reverse; }
        .cloud-5 { width: 200px; bottom: 5%; left: 10%; --speed: 7.5s; }
        .cloud-6 { width: 150px; bottom: 15%; right: 8%; --speed: 8s; animation-direction: alternate-reverse; }
        @keyframes cloudDrift { 0% { transform: translateX(0); } 100% { transform: translateX(50px); } }

        /* 氛围闪烁星星 */
        .deco-star {
            position: absolute; width: 28px;
            animation: starTwinkle 2s infinite alternate ease-in-out;
        }
        .star-1 { top: 25%; left: 12%; animation-delay: 0s; }
        .star-2 { top: 55%; left: 35%; animation-delay: 0.7s; }
        .star-3 { top: 38%; right: 22%; animation-delay: 1.4s; }

        /* 6片巨大化、红绿棕全色系、自由坠落的枫叶 */
        .deco-leaf {
            position: absolute; width: 70px; /* 巨大化表现 */
            opacity: 0.95;
            animation: leafFall var(--fall-speed, 5s) infinite alternate ease-in-out;
        }
        .leaf-1 { top: 35%; left: 8%; transform: rotate(15deg); --fall-speed: 4.5s; }
        .leaf-2 { top: 52%; left: 25%; transform: rotate(-10deg); --fall-speed: 5.2s; animation-delay: 1s; }
        .leaf-3 { top: 28%; right: 10%; transform: rotate(-25deg); --fall-speed: 4.8s; animation-delay: 0.5s; }
        .leaf-4 { top: 48%; right: 28%; transform: rotate(30deg); --fall-speed: 5.5s; animation-delay: 1.8s; }
        .leaf-5 { bottom: 25%; left: 18%; transform: rotate(45deg); --fall-speed: 6s; animation-delay: 2.2s; }
        .leaf-6 { bottom: 30%; right: 15%; transform: rotate(-15deg); --fall-speed: 5s; animation-delay: 1.2s; }
        @keyframes leafFall { 
            0% { transform: translate(0, 0) rotate(0deg); } 
            100% { transform: translate(-20px, 30px) rotate(25deg); } 
        }

        /* 3. 顶置主图锚点：霸气全覆盖，严密压盖线头 */
        .sky-anchor {
            position: absolute; top: -3%; left: 50%; transform: translateX(-50%);
            width: 125%; max-width: 580px; z-index: 20; 
        }
        .sky-cushion { width: 100%; display: block; }
        .sky-cat {
            position: absolute; top: 12%; left: 8%; width: 85%; height: 75%;
            object-fit: contain; transform-origin: center center;
            animation: skyBreathe 4s infinite ease-in-out; cursor: pointer;
        }
        @keyframes skyBreathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.015); } }

        /* 4. 魔法风铃区 (全部挂星星绳，极其自然衔接) */
        .chime-container {
            position: absolute; top: 23%; width: 100px;
            display: flex; flex-direction: column; align-items: center;
            transform-origin: top center; z-index: 8; 
            animation: pendulumSway var(--sway-duration, 5s) infinite ease-in-out alternate;
        }
        #chime-diary { left: 6%; top: 22%; --sway-duration: 4.2s; }
        #chime-story { left: 32%; top: 30%; --sway-duration: 5.0s; }
        #chime-chat { right: 32%; top: 25%; --sway-duration: 4.6s; }
        #chime-fish { right: 6%; top: 32%; --sway-duration: 5.3s; }
        @keyframes pendulumSway { 0% { transform: rotate(-4deg); } 100% { transform: rotate(4deg); } }

        .chime-rope {
            width: 28px; height: var(--rope-length, 110px);
            object-fit: cover; object-position: top center; margin-bottom: -12px; 
        }

        /* 5. 绝对正圆、绝不挤扁、带物理弹性反馈的泡泡 */
        .bubble-box {
            width: 100px; height: 100px;
            flex-shrink: 0; /* 绝对锁死比例 */
            position: relative;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.15s;
        }
        
        /* JS 绑定的物理点击回弹样式 */
        .bubble-box.is-clicked {
            transform: scale(0.82) translateY(6px);
            filter: brightness(1.1) drop-shadow(0 0 10px rgba(255,255,255,0.8));
        }
        
        .bubble-bg {
            position: absolute; width: 100%; height: 100%;
            top: 0; left: 0; z-index: 1; pointer-events: none;
        }
        .bubble-icon {
            width: 65%; height: 65%;
            object-fit: contain; z-index: 2; 
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.15));
        }
    </style>
</head>
<body>

    <div class="ambient-layer">
        <img class="deco-vine vine-left" src="assets/藤蔓装饰.png">
        <img class="deco-vine vine-right" src="assets/藤蔓装饰.png">
        
        <img class="deco-cloud cloud-1" src="assets/装饰-云大.png">
        <img class="deco-cloud cloud-2" src="assets/装饰-云小.png">
        <img class="deco-cloud cloud-3" src="assets/装饰-云大.png">
        <img class="deco-cloud cloud-4" src="assets/装饰-云小.png">
        <img class="deco-cloud cloud-5" src="assets/装饰-云大.png">
        <img class="deco-cloud cloud-6" src="assets/装饰-云小.png">
        
        <img class="deco-star star-1" src="assets/装饰-星星.png">
        <img class="deco-star star-2" src="assets/装饰-星星.png">
        <img class="deco-star star-3" src="assets/装饰-星星.png">
        
        <img class="deco-leaf leaf-1" src="assets/装饰-枫叶红.png">
        <img class="deco-leaf leaf-2" src="assets/装饰-枫叶绿.png">
        <img class="deco-leaf leaf-3" src="assets/装饰-枫叶棕.png">
        <img class="deco-leaf leaf-4" src="assets/装饰-枫叶红.png">
        <img class="deco-leaf leaf-5" src="assets/装饰-枫叶绿.png">
        <img class="deco-leaf leaf-6" src="assets/装饰-枫叶棕.png">
    </div>

    <div class="sky-anchor">
        <img class="sky-cushion" src="assets/头图-垫子.png" alt="天空软垫">
        <img class="sky-cat" id="main-cat" src="assets/头图-猫闭眼.png" alt="睡梦中的猫">
    </div>

    <div class="chime-container" id="chime-diary" style="--rope-length: 90px;">
        <img class="chime-rope" src="assets/星星挂绳.png">
        <div class="bubble-box"><img class="bubble-bg" src="assets/泡泡.png"><img class="bubble-icon" src="assets/入口-观察日记.png"></div>
    </div>

    <div class="chime-container" id="chime-story" style="--rope-length: 150px;">
        <img class="chime-rope" src="assets/星星挂绳.png">
        <div class="bubble-box"><img class="bubble-bg" src="assets/泡泡.png"><img class="bubble-icon" src="assets/入口-小猫故事.png"></div>
    </div>

    <div class="chime-container" id="chime-chat" style="--rope-length: 120px;">
        <img class="chime-rope" src="assets/星星挂绳.png">
        <div class="bubble-box"><img class="bubble-bg" src="assets/泡泡.png"><img class="bubble-icon" src="assets/入口-碎碎念念.png"></div>
    </div>

    <div class="chime-container" id="chime-fish" style="--rope-length: 190px;">
        <img class="chime-rope" src="assets/星星挂绳.png">
        <div class="bubble-box"><img class="bubble-bg" src="assets/泡泡.png"><img class="bubble-icon" src="assets/入口-罐头鱼干.png"></div>
    </div>

<script>
        try {
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('/sw.js')
                        .then(reg => console.log('猫窝 V5.0 终极架构已就绪。'))
                        .catch(err => console.log('降级在线加载。'));
                });
            }
        } catch (error) { console.log('跳过离线堡垒。'); }

        // 1. 大黑猫睁眼互动逻辑
        const catImg = document.getElementById('main-cat');
        let sleepTimer = null;
        if (catImg) {
            catImg.addEventListener('click', () => {
                catImg.src = 'assets/头图-猫睁眼.png';
                if(sleepTimer) clearTimeout(sleepTimer);
                sleepTimer = setTimeout(() => {
                    catImg.src = 'assets/头图-猫闭眼.png';
                }, 3500);
            });
        }

        // 2. 气泡点击专属 JS 物理回弹与交互反馈引擎
        const bubbles = document.querySelectorAll('.bubble-box');
        bubbles.forEach(bubble => {
            bubble.addEventListener('click', function() {
                // 立即添加回弹样式的 Class
                this.classList.add('is-clicked');
                
                // 300毫秒后自动移除，形成极其生动的 Q 弹手感
                setTimeout(() => {
                    this.classList.remove('is-clicked');
                }, 300);
            });
        });
    </script>
</body>
</html>
