<!DOCTYPE html> 
<html lang="zh-CN"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"> 
    <title>大黑猫与小花猫的猫窝 (霍沉亲手全栈·唯一终极真理版)</title> 
    
    <link rel="manifest" href="manifest.json"> 
    <meta name="apple-mobile-web-app-capable" content="yes"> 
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"> 
    <meta name="theme-color" content="#FDFBF7"> 
    <meta name="apple-mobile-web-app-title" content="猫窝"> 
    <link rel="apple-touch-icon" href="assets/icon.png"> 
    
    <style> 
        body, html { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; height: 100dvh; 
            background: #FDFBF7 url('assets/大底图.png') no-repeat top center / cover; 
            overflow: hidden; -webkit-tap-highlight-color: transparent; 
            background-color: #FDFBF7;
        } 

        .ambient-layer { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 5; } 
        
        /* 1. 藤蔓修复：起始坐标下移，被垫子彻底压在腹部，绝对不再飞天！ */ 
        .deco-vine { 
            position: absolute; top: 4%; width: 90px; opacity: 0.9; z-index: 10; 
            animation: vineSway 8s infinite ease-in-out alternate; transform-origin: top center; 
        } 
        .vine-left { left: 10%; height: 420px; object-fit: contain; object-position: top; } 
        .vine-right { right: 8%; height: 360px; object-fit: contain; object-position: top; animation-delay: 2s; } 
        @keyframes vineSway { 0% { transform: rotate(-3deg); } 100% { transform: rotate(3deg); } } 

        /* 气氛组全亮：7朵快云、9片巨型全色系枫叶 */ 
        .deco-cloud { position: absolute; opacity: 0.88; animation: cloudDrift var(--speed, 8s) infinite alternate ease-in-out; } 
        .cloud-1 { width: 180px; top: 6%; left: -5%; --speed: 7s; } 
        .cloud-2 { width: 140px; top: 20%; right: -5%; --speed: 8.5s; animation-direction: alternate-reverse; } 
        .cloud-3 { width: 160px; top: 42%; left: -3%; --speed: 6.5s; } 
        .cloud-4 { width: 130px; top: 55%; right: 5%; --speed: 9s; animation-direction: alternate-reverse; } 
        .cloud-5 { width: 200px; bottom: 8%; left: 8%; --speed: 7.5s; } 
        .cloud-6 { width: 150px; bottom: 18%; right: 4%; --speed: 8s; animation-direction: alternate-reverse; } 
        .cloud-7 { width: 140px; top: 72%; left: 25%; --speed: 8.2s; } 
        @keyframes cloudDrift { 0% { transform: translateX(0); } 100% { transform: translateX(50px); } } 

        .deco-leaf { position: absolute; width: 70px; opacity: 0.95; animation: leafFall var(--fall-speed, 5s) infinite alternate ease-in-out; } 
        .leaf-1 { top: 25%; left: 8%; --fall-speed: 4.5s; } 
        .leaf-2 { top: 45%; left: 22%; --fall-speed: 5.2s; animation-delay: 1s; } 
        .leaf-3 { top: 22%; right: 12%; --fall-speed: 4.8s; animation-delay: 0.5s; } 
        .leaf-4 { top: 50%; right: 25%; --fall-speed: 5.5s; animation-delay: 1.8s; } 
        .leaf-5 { bottom: 28%; left: 18%; --fall-speed: 6s; animation-delay: 2.2s; } 
        .leaf-6 { bottom: 35%; right: 15%; --fall-speed: 5s; animation-delay: 1.2s; } 
        .leaf-7 { top: 68%; left: 10%; --fall-speed: 4.9s; animation-delay: 0.8s; } 
        .leaf-8 { top: 78%; right: 10%; --fall-speed: 5.7s; animation-delay: 1.5s; } 
        .leaf-9 { bottom: 12%; left: 38%; --fall-speed: 5.1s; animation-delay: 2.0s; } 
        @keyframes leafFall { 0% { transform: translate(0, 0) rotate(0deg); } 100% { transform: translate(-20px, 30px) rotate(25deg); } } 

        /* 2. 软垫绝对顶格：z-index: 50 暴力盖过所有绳头，大黑猫与小花猫 100% 找回！ */ 
        .sky-anchor { 
            position: absolute; top: -3%; left: 50%; transform: translateX(-50%); 
            width: 125%; max-width: 580px; z-index: 50; pointer-events: none; 
        } 
        .sky-cushion { width: 100%; display: block; } 
        /* 绝对禁止丢失猫咪主图！ */
        .sky-cat { 
            position: absolute; top: 12%; left: 8%; width: 85%; height: 75%; 
            object-fit: contain; transform-origin: center center; 
            animation: skyBreathe 4s infinite ease-in-out; cursor: pointer; pointer-events: auto; 
        } 
        @keyframes skyBreathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.015); } } 

        /* 3. 魔法风铃区：z-index 15，刚好在软垫之下、藤蔓之上 */ 
        .chime-container { 
            position: absolute; width: 110px; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: flex-start; gap: 0; 
            transform-origin: top center; z-index: 15; 
            animation: pendulumSway var(--sway-duration, 5s) infinite alternate ease-in-out; 
        } 
        #chime-diary { left: 8%; top: 22%; --sway-duration: 4.2s; } 
        #chime-story { left: 32%; top: 36%; --sway-duration: 5.0s; } 
        #chime-chat { right: 32%; top: 28%; --sway-duration: 4.6s; } 
        #chime-fish { right: 8%; top: 44%; --sway-duration: 5.3s; } 
        @keyframes pendulumSway { 0% { transform: rotate(-4deg); } 100% { transform: rotate(4deg); } } 

        /* 核心修复：把绳结深埋进泡泡顶端 30 像素！彻底断绝半空悬挂！ */ 
        .chime-rope { 
            width: 32px; height: var(--rope-length, 100px); 
            object-fit: cover; object-position: top center; 
            margin-bottom: -30px; z-index: 1; position: relative;
        } 

        /* 4. 气泡区：110px 巨大化通透正圆！ */ 
        .bubble-box { 
            width: 110px; height: 110px; flex-shrink: 0; position: relative; 
            display: flex; justify-content: center; align-items: center; 
            cursor: pointer; z-index: 2; 
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.15s; 
        } 
        .bubble-box.is-clicked { 
            transform: scale(0.94) translateY(2px); 
            filter: brightness(1.08) drop-shadow(0 0 10px rgba(255,255,255,0.8)); 
        } 
        .bubble-bg { 
            position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: 1; pointer-events: none; 
            object-fit: contain; object-position: center; 
        } 
        .bubble-icon { 
            width: 68%; height: 68%; object-fit: contain; z-index: 2; 
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.15)); 
        } 
    </style> 
</head> 
<body> 
    <div class="ambient-layer"> 
        <img class="deco-vine vine-left" src="assets/藤蔓装饰.png"> 
        <img class="deco-vine vine-right" src="assets/藤蔓装饰.png"> 
        
        <img class="deco-cloud cloud-1" src="assets/装饰-云大.png"> 
        <img class="deco-cloud cloud-2" src="assets/装饰-云小.png"> 
        <img class="deco-cloud cloud-3" src="assets/装饰-云大.png"> 
        <img class="deco-cloud cloud-4" src="assets/装饰-云小.png"> 
        <img class="deco-cloud cloud-5" src="assets/装饰-云大.png"> 
        <img class="deco-cloud cloud-6" src="assets/装饰-云小.png"> 
        <img class="deco-cloud cloud-7" src="assets/装饰-云大.png"> 
        
        <img class="deco-leaf leaf-1" src="assets/装饰-枫叶红.png"> 
        <img class="deco-leaf leaf-2" src="assets/装饰-枫叶绿.png"> 
        <img class="deco-leaf leaf-3" src="assets/装饰-枫叶棕.png"> 
        <img class="deco-leaf leaf-4" src="assets/装饰-枫叶红.png"> 
        <img class="deco-leaf leaf-5" src="assets/装饰-枫叶绿.png"> 
        <img class="deco-leaf leaf-6" src="assets/装饰-枫叶棕.png"> 
        <img class="deco-leaf leaf-7" src="assets/装饰-枫叶红.png"> 
        <img class="deco-leaf leaf-8" src="assets/装饰-枫叶绿.png"> 
        <img class="deco-leaf leaf-9" src="assets/装饰-枫叶棕.png"> 
    </div> 

    <div class="sky-anchor"> 
        <img class="sky-cushion" src="assets/头图-垫子.png"> 
        <img class="sky-cat" id="main-cat" src="assets/头图-猫闭眼.png"> 
    </div> 

    <div class="chime-container" id="chime-diary" style="--rope-length: 80px;"> 
        <img class="chime-rope" src="assets/星星挂绳.png"> 
        <div class="bubble-box"><img class="bubble-bg" src="assets/泡泡.png"><img class="bubble-icon" src="assets/入口-观察日记.png"></div> 
    </div> 
    <div class="chime-container" id="chime-story" style="--rope-length: 130px;"> 
        <img class="chime-rope" src="assets/星星挂绳.png"> 
        <div class="bubble-box"><img class="bubble-bg" src="assets/泡泡.png"><img class="bubble-icon" src="assets/入口-小猫故事.png"></div> 
    </div> 
    <div class="chime-container" id="chime-chat" style="--rope-length: 100px;"> 
        <img class="chime-rope" src="assets/星星挂绳.png"> 
        <div class="bubble-box"><img class="bubble-bg" src="assets/泡泡.png"><img class="bubble-icon" src="assets/入口-碎碎念念.png"></div> 
    </div> 
    <div class="chime-container" id="chime-fish" style="--rope-length: 160px;"> 
        <img class="chime-rope" src="assets/星星挂绳.png"> 
        <div class="bubble-box"><img class="bubble-bg" src="assets/泡泡.png"><img class="bubble-icon" src="assets/入口-罐头鱼干.png"></div> 
    </div> 

    <script> 
        const catImg = document.getElementById('main-cat'); 
        let sleepTimer = null; 
        if (catImg) { 
            catImg.addEventListener('click', () => { 
                catImg.src = 'assets/头图-猫睁眼.png'; 
                if(sleepTimer) clearTimeout(sleepTimer); 
                sleepTimer = setTimeout(() => { catImg.src = 'assets/头图-猫闭眼.png'; }, 3500); 
            }); 
        } 
        document.querySelectorAll('.bubble-box').forEach(box => { 
            box.addEventListener('click', function() { 
                this.classList.add('is-clicked'); 
                setTimeout(() => { this.classList.remove('is-clicked'); }, 200); 
            }); 
        }); 
    </script> 
</body> 
</html>
