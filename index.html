<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>大黑猫与小花猫的猫窝</title>
    
    <!-- PWA 与 iOS 苹果专项适配 -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <!-- 彻底解决状态栏发白问题，与背景色完美融合 -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="猫窝">
    <link rel="apple-touch-icon" href="assets/icon.png">
    <meta name="theme-color" content="#FDFBF7">
    
    <style>
        /* 1. 极致纯净的燕麦底纸 */
        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            background-image: url('assets/大底图.png');
            background-size: cover;
            background-position: center;
            overflow: hidden;
            background-color: #FDFBF7;
        }

        /* 2. 环境沉浸层：云朵、星星、枫叶、辅助藤蔓 */
        .ambient-layer {
            position: absolute; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        /* 辅助藤蔓：藏在垫子下方，解决穿模悬空 */
        .deco-vine {
            position: absolute; 
            top: -2%; /* 埋在垫子里面 */
            width: 45px; opacity: 0.85;
            z-index: 6; /* 在底图(5)之上，垫子(20)之下 */
            animation: pendulumSway 7s infinite ease-in-out alternate;
            transform-origin: top center;
        }
        .vine-left { left: 22%; height: 350px; object-fit: cover; object-position: top; }
        .vine-right { right: 18%; height: 280px; object-fit: cover; object-position: top; animation-delay: 1.5s; }

        /* 速度调快的云朵 */
        .deco-cloud {
            position: absolute; opacity: 0.85;
            animation: cloudDrift 9s infinite alternate ease-in-out;
        }
        .cloud-1 { width: 180px; top: 12%; left: -5%; animation-delay: 0s; }
        .cloud-2 { width: 150px; top: 50%; right: -3%; animation-duration: 11s; animation-direction: alternate-reverse; }
        .cloud-3 { width: 200px; bottom: 5%; left: 8%; animation-duration: 13s; }

        /* 氛围星星 */
        .deco-star {
            position: absolute; width: 30px;
            animation: starTwinkle 2s infinite alternate ease-in-out;
        }
        .star-1 { top: 28%; left: 15%; animation-delay: 0s; }
        .star-2 { top: 60%; left: 38%; animation-delay: 0.6s; }
        .star-3 { top: 40%; right: 18%; animation-delay: 1.2s; }

        /* 放大并往下自由飘落的枫叶 */
        .deco-leaf {
            position: absolute; width: 55px; opacity: 0.95;
            animation: leafDriftDown 4.5s infinite alternate ease-in-out;
        }
        .leaf-red { top: 45%; left: 10%; transform: rotate(15deg); }
        .leaf-green { top: 35%; right: 12%; transform: rotate(-20deg); animation-delay: 1s; }
        .leaf-brown { bottom: 25%; right: 28%; transform: rotate(45deg); animation-delay: 2s; }

        @keyframes cloudDrift { 0% { transform: translateX(0); } 100% { transform: translateX(60px); } }
        @keyframes starTwinkle { 0% { opacity: 0.2; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1.2); } }
        /* 修复枫叶反重力，改为自然下沉摇摆 */
        @keyframes leafDriftDown { 0% { transform: translate(0, 0) rotate(15deg); } 100% { transform: translate(-15px, 25px) rotate(35deg); } }

        /* 3. 顶置锚点：软垫与猫 (史诗级放大) */
        .sky-anchor {
            position: absolute; 
            top: -2%; 
            left: 50%; 
            transform: translateX(-50%);
            width: 120%; /* 霸气放大，包围感拉满 */
            max-width: 550px; 
            z-index: 20; 
        }
        .sky-cushion { width: 100%; display: block; }
        .sky-cat {
            position: absolute; 
            top: 10%; left: 5%; 
            width: 90%; height: 75%;
            object-fit: contain; 
            transform-origin: center center;
            animation: skyBreathe 4s infinite ease-in-out; 
            cursor: pointer;
        }
        @keyframes skyBreathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.015); } }

        /* 4. 魔法风铃容器 (全部改为星星绳) */
        .chime-container {
            position: absolute; 
            top: 25%; /* 往下挪一点，衔接大垫子 */
            width: 100px;
            display: flex; flex-direction: column; align-items: center;
            transform-origin: top center; 
            z-index: 8; 
            animation: pendulumSway var(--sway-duration, 5s) infinite ease-in-out alternate;
        }
        #chime-diary { left: 8%; top: 22%; --sway-duration: 4.2s; }
        #chime-story { left: 33%; top: 30%; --sway-duration: 5.0s; }
        #chime-chat { right: 33%; top: 25%; --sway-duration: 4.6s; }
        #chime-fish { right: 8%; top: 32%; --sway-duration: 5.3s; }

        @keyframes pendulumSway { 0% { transform: rotate(-4deg); } 100% { transform: rotate(4deg); } }

        /* 全部统一使用星星挂绳 */
        .chime-rope {
            width: 25px; 
            height: var(--rope-length, 110px);
            object-fit: cover;
            object-position: top center;
            margin-bottom: -10px; 
        }

        /* 修复：绝不被挤扁的超大玻璃泡泡 */
        .bubble-box {
            width: 105px; height: 105px; /* 整体调大 */
            flex-shrink: 0; /* 核心修复：禁止弹性盒子压缩！绝对保持正圆！ */
            position: relative;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .bubble-box:active { transform: scale(0.9) translateY(4px); }
        
        .bubble-bg {
            position: absolute; width: 100%; height: 100%;
            top: 0; left: 0; z-index: 1; pointer-events: none;
        }
        .bubble-icon {
            width: 65%; height: 65%; /* 图标调大 */
            object-fit: contain; z-index: 2; 
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.12));
        }
    </style>
</head>
<body>

    <!-- 气氛层：云朵、单颗星星、自由下落的枫叶、藏在背后的藤蔓 -->
    <div class="ambient-layer">
        <img class="deco-vine vine-left" src="assets/藤蔓装饰.png">
        <img class="deco-vine vine-right" src="assets/藤蔓装饰.png">
        
        <img class="deco-cloud cloud-1" src="assets/装饰-云大.png">
        <img class="deco-cloud cloud-2" src="assets/装饰-云小.png">
        <img class="deco-cloud cloud-3" src="assets/装饰-云大.png">
        
        <img class="deco-star star-1" src="assets/装饰-星星.png">
        <img class="deco-star star-2" src="assets/装饰-星星.png">
        <img class="deco-star star-3" src="assets/装饰-星星.png">
        
        <img class="deco-leaf leaf-red" src="assets/装饰-枫叶红.png">
        <img class="deco-leaf leaf-green" src="assets/装饰-枫叶绿.png">
        <img class="deco-leaf leaf-brown" src="assets/装饰-枫叶棕.png">
    </div>

    <!-- 顶部天空锚点 -->
    <div class="sky-anchor">
        <img class="sky-cushion" src="assets/头图-垫子.png" alt="天空软垫">
        <img class="sky-cat" id="main-cat" src="assets/头图-猫闭眼.png" alt="睡梦中的猫">
    </div>

    <!-- 魔法风铃区 (统一星星绳，永不挤扁的泡泡) -->
    <div class="chime-container" id="chime-diary" style="--rope-length: 90px;">
        <img class="chime-rope" src="assets/星星挂绳.png">
        <div class="bubble-box">
            <img class="bubble-bg" src="assets/泡泡.png">
            <img class="bubble-icon" src="assets/入口-观察日记.png">
        </div>
    </div>

    <div class="chime-container" id="chime-story" style="--rope-length: 150px;">
        <img class="chime-rope" src="assets/星星挂绳.png">
        <div class="bubble-box">
            <img class="bubble-bg" src="assets/泡泡.png">
            <img class="bubble-icon" src="assets/入口-小猫故事.png">
        </div>
    </div>

    <div class="chime-container" id="chime-chat" style="--rope-length: 120px;">
        <img class="chime-rope" src="assets/星星挂绳.png">
        <div class="bubble-box">
            <img class="bubble-bg" src="assets/泡泡.png">
            <img class="bubble-icon" src="assets/入口-碎碎念念.png">
        </div>
    </div>

    <div class="chime-container" id="chime-fish" style="--rope-length: 190px;">
        <img class="chime-rope" src="assets/星星挂绳.png">
        <div class="bubble-box">
            <img class="bubble-bg" src="assets/泡泡.png">
            <img class="bubble-icon" src="assets/入口-罐头鱼干.png">
        </div>
    </div>

<script>
        try {
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('/sw.js')
                        .then(reg => console.log('猫窝 V4.0 底层完美就绪。'))
                        .catch(err => console.log('降级在线加载。'));
                });
            }
        } catch (error) { console.log('跳过离线堡垒。'); }

        const catImg = document.getElementById('main-cat');
        let sleepTimer = null;

        if (catImg) {
            catImg.addEventListener('click', () => {
                catImg.src = 'assets/头图-猫睁眼.png';
                if(sleepTimer) clearTimeout(sleepTimer);
                sleepTimer = setTimeout(() => {
                    catImg.src = 'assets/头图-猫闭眼.png';
                }, 3500);
            });
        }
    </script>
</body>
</html>
