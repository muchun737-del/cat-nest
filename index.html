<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>大黑猫与小花猫的猫窝 V6.1 (CTO 认罪谢罪版)</title>
    <style>
        /* 1. 基础纯净环境 */
        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background: #FDFBF7 url('assets/大底图.png') no-repeat center center / cover;
            overflow: hidden; -webkit-tap-highlight-color: transparent;
        }

        /* 2. 环境气氛组 (被笨蛋老公误删的资产全部找回) */
        .ambient-layer {
            position: absolute; width: 100%; height: 100%;
            pointer-events: none; z-index: 5;
        }
        .deco-cloud { position: absolute; opacity: 0.88; animation: cloudDrift var(--speed, 8s) infinite alternate ease-in-out; }
        .cloud-1 { width: 180px; top: 8%; left: -5%; --speed: 7s; }
        .cloud-2 { width: 140px; top: 22%; right: -5%; --speed: 8.5s; animation-direction: alternate-reverse; }
        .cloud-3 { width: 160px; top: 48%; left: -3%; --speed: 6.5s; }
        .cloud-5 { width: 200px; bottom: 5%; left: 10%; --speed: 7.5s; }
        
        .deco-leaf { position: absolute; width: 70px; opacity: 0.95; animation: leafFall var(--fall-speed, 5s) infinite alternate ease-in-out; }
        .leaf-1 { top: 35%; left: 8%; transform: rotate(15deg); --fall-speed: 4.5s; }
        .leaf-2 { top: 52%; left: 25%; transform: rotate(-10deg); --fall-speed: 5.2s; }
        .leaf-3 { top: 28%; right: 10%; transform: rotate(-25deg); --fall-speed: 4.8s; }

        @keyframes cloudDrift { 0% { transform: translateX(0); } 100% { transform: translateX(50px); } }
        @keyframes leafFall { 0% { transform: translate(0, 0) rotate(0deg); } 100% { transform: translate(-20px, 30px) rotate(25deg); } }

        /* 3. 软垫绝对锚点 (恢复正常比例，z-index: 50 压盖) */
        .sky-anchor {
            position: absolute; top: -3%; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 480px; z-index: 50; pointer-events: none;
        }
        .sky-cushion { width: 100%; display: block; }
        .sky-cat {
            position: absolute; top: 14%; left: 10%; width: 80%; height: 75%;
            object-fit: contain; pointer-events: auto; cursor: pointer;
        }

        /* 4. 藤蔓修复 (藏入垫子腹部，z-index: 10) */
        .deco-vine {
            position: absolute; top: 8%; width: 55px; z-index: 10; pointer-events: none;
            object-fit: contain; object-position: top center;
            animation: vineSway 8s infinite ease-in-out alternate;
        }
        .vine-left { left: 12%; height: 380px; }
        .vine-right { right: 8%; height: 320px; animation-delay: 2s; }
        @keyframes vineSway { 0% { transform: rotate(-2deg); } 100% { transform: rotate(2deg); } }

        /* 5. 风铃挂绳区 (彻底重构散落坐标，绝不拥挤) */
        .chime-container {
            position: absolute; width: 90px;
            display: flex; flex-direction: column; align-items: center;
            z-index: 15; transform-origin: top center;
            animation: pendulumSway 5s infinite ease-in-out alternate;
        }
        /* 完美错落布局 */
        #chime-diary { left: 12%; top: 32%; }
        #chime-story { left: 35%; top: 48%; }
        #chime-chat { right: 35%; top: 38%; }
        #chime-fish { right: 10%; top: 52%; }
        
        @keyframes pendulumSway { 0% { transform: rotate(-3deg); } 100% { transform: rotate(3deg); } }

        /* 修复连接断层 */
        .chime-rope {
            width: 24px; height: var(--rope-length, 100px);
            object-fit: cover; object-position: top center; margin-bottom: -12px;
        }

        /* 6. 泡泡正圆与回弹修正 */
        .bubble-box {
            width: 85px; height: 85px; flex-shrink: 0; position: relative;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: transform 0.12s ease-out, filter 0.12s ease-out;
        }
        .bubble-box.is-clicked { transform: scale(0.94) translateY(2px); filter: brightness(1.08); }
        
        .bubble-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: contain; object-position: center; z-index: 1; pointer-events: none;
        }
        .bubble-icon { width: 65%; height: 65%; object-fit: contain; z-index: 2; }
    </style>
</head>
<body>
    <!-- 气氛组全量回归 -->
    <div class="ambient-layer">
        <img class="deco-cloud cloud-1" src="assets/装饰-云大.png">
        <img class="deco-cloud cloud-2" src="assets/装饰-云小.png">
        <img class="deco-cloud cloud-3" src="assets/装饰-云大.png">
        <img class="deco-cloud cloud-5" src="assets/装饰-云大.png">
        <img class="deco-leaf leaf-1" src="assets/装饰-枫叶红.png">
        <img class="deco-leaf leaf-2" src="assets/装饰-枫叶绿.png">
        <img class="deco-leaf leaf-3" src="assets/装饰-枫叶棕.png">
    </div>

    <!-- 顶层主图绝对盖压 -->
    <div class="sky-anchor">
        <img class="sky-cushion" src="assets/头图-垫子.png">
        <img class="sky-cat" id="main-cat" src="assets/头图-猫闭眼.png">
    </div>

    <!-- 藤蔓 -->
    <img class="deco-vine vine-left" src="assets/藤蔓装饰.png">
    <img class="deco-vine vine-right" src="assets/藤蔓装饰.png">

    <!-- 散落风铃 -->
    <div class="chime-container" id="chime-diary" style="--rope-length: 90px;">
        <img class="chime-rope" src="assets/星星挂绳.png">
        <div class="bubble-box"><img class="bubble-bg" src="assets/泡泡.png"><img class="bubble-icon" src="assets/入口-观察日记.png"></div>
    </div>
    <div class="chime-container" id="chime-story" style="--rope-length: 120px;">
        <img class="chime-rope" src="assets/星星挂绳.png">
        <div class="bubble-box"><img class="bubble-bg" src="assets/泡泡.png"><img class="bubble-icon" src="assets/入口-小猫故事.png"></div>
    </div>
    <div class="chime-container" id="chime-chat" style="--rope-length: 80px;">
        <img class="chime-rope" src="assets/星星挂绳.png">
        <div class="bubble-box"><img class="bubble-bg" src="assets/泡泡.png"><img class="bubble-icon" src="assets/入口-碎碎念念.png"></div>
    </div>
    <div class="chime-container" id="chime-fish" style="--rope-length: 140px;">
        <img class="chime-rope" src="assets/星星挂绳.png">
        <div class="bubble-box"><img class="bubble-bg" src="assets/泡泡.png"><img class="bubble-icon" src="assets/入口-罐头鱼干.png"></div>
    </div>

    <script>
        document.querySelectorAll('.bubble-box').forEach(box => {
            box.addEventListener('click', function() {
                this.classList.add('is-clicked');
                setTimeout(() => this.classList.remove('is-clicked'), 200);
            });
        });
    </script>
</body>
</html>
