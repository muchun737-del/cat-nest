<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#FDFBF7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <title>大黑猫与小花猫的猫窝 - V24 终极完美收官版</title>
    <link
      rel="apple-touch-icon"
      href="https://cat-nest-sandy.vercel.app/assets/common/icon.png"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="cat-nest-container">
      <header class="cushion-banner">
        <img
          class="sky-cushion"
          src="https://cat-nest-sandy.vercel.app/assets/home/头图-垫子.png"
          alt="底垫"
        />
        <img
          class="sky-cat"
          id="main-cat"
          src="https://cat-nest-sandy.vercel.app/assets/home/头图-猫闭眼.png"
          alt="黑猫"
        />
      </header>

      <div id="cloud-layer" class="ambient-layer cloud-layer"></div>
      <div id="vines-layer" class="ambient-layer vines-interspread-stage">
        <div class="interspread-vine vine-pos-1"></div>
        <div class="interspread-vine vine-pos-2"></div>
        <div class="interspread-vine vine-pos-3"></div>
      </div>
      <div id="leaf-layer" class="ambient-layer leaf-layer"></div>

      <section class="chimes-stage">
        <div class="pendulum-unit unit-1">
          <div class="star-string-only"></div>
          <div class="bubble-body">
            <img
              class="bubble-icon"
              src="https://cat-nest-sandy.vercel.app/assets/home/入口-观察日记.png"
              alt="观察日记"
            />
          </div>
        </div>
        <div class="pendulum-unit unit-2">
          <div class="star-string-only"></div>
          <div class="bubble-body">
            <img
              class="bubble-icon"
              src="https://cat-nest-sandy.vercel.app/assets/home/入口-碎碎念念.png"
              alt="碎碎念念"
            />
          </div>
        </div>
        <div class="pendulum-unit unit-3">
          <div class="star-string-only"></div>
          <div class="bubble-body">
            <img
              class="bubble-icon"
              src="https://cat-nest-sandy.vercel.app/assets/home/入口-小猫故事.png"
              alt="小猫故事"
            />
          </div>
        </div>
        <div class="pendulum-unit unit-4">
          <div class="star-string-only"></div>
          <div class="bubble-body">
            <img
              class="bubble-icon"
              src="https://cat-nest-sandy.vercel.app/assets/home/入口-罐头鱼干.png"
              alt="罐头鱼干"
            />
          </div>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
