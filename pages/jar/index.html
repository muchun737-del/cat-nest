<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#FDFBF7" />
    <title>碎片收纳 - 猫窝</title>
    <link rel="stylesheet" href="jar.css" />
</head>
<body>
    <div class="vignette-overlay"></div>

    <main class="jar-page-container">
        <header class="jar-header">
            <img class="title-img" src="../../assets/jar/碎片收纳-字.png" alt="Memory Fragments" />
        </header>

        <div class="interactive-triggers">
            <img id="trigger-fish" class="trigger-icon pos-fish" src="../../assets/jar/碎片收纳-小鱼干.png" alt="投喂鱼干" />
            <img id="trigger-can" class="trigger-icon pos-can" src="../../assets/jar/碎片收纳-猫罐头.png" alt="投喂罐头" />
        </div>

        <section class="jar-interactive-stage">
            <div id="firefly-layer" class="ambient-layer"></div>
            
            <div class="jar-wrapper">
                <img id="cork-btn" class="cork-img" src="../../assets/jar/碎片收纳-木塞.png" alt="木塞" />
                <img class="glass-img" src="../../assets/jar/碎片收纳-瓶子.png" alt="玻璃瓶" />
                
                <div id="assets-container" class="assets-inside-jar"></div>
            </div>
        </section>
    </main>

    <script src="jar.js"></script>
</body>
</html>
